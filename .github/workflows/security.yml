name: Security Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Run pip-audit
        run: |
          pip-audit --progress-spinner off --path .
      - name: Run bandit
        run: |
          bandit -r src -lll
